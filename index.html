<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIZUKU DESIGN | 作品展示</title>
    <style>
        /* 基础样式 */
        body { 
            background-color: #111; 
            color: #fff; 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center;
        }
        
        header { 
            border-bottom: 1px solid #333; 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
            width: 100%; 
            max-width: 600px;
        }
        
        h1 { font-size: 24px; letter-spacing: 4px; text-transform: uppercase; font-weight: 200;}

        /* 作品展示区 */
        .work-display { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 15px; 
            max-width: 800px; 
            width: 100%;
            transition: 0.5s;
        }
        
        .work-display img { 
            width: 100%; 
            height: auto; 
            display: block; 
            filter: brightness(0.8); 
            transition: 0.5s;
        }
        
        .work-display:hover { border-color: #555; }
        .work-display:hover img { filter: brightness(1); }
        
        .description { 
            margin-top: 15px; 
            font-size: 13px; 
            color: #666; 
            letter-spacing: 1px;
        }

        /* 极简音乐按钮 */
        #music-control {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 45px;
            height: 45px;
            border: 1px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            transition: all 0.4s ease;
        }
        
        #music-control:hover {
            border-color: #fff;
            transform: scale(1.1);
        }
        
        #music-icon {
            font-size: 10px;
            letter-spacing: 1px;
            color: #fff;
            opacity: 0.6;
        }

        footer { 
            margin-top: 60px; 
            font-size: 11px; 
            color: #444; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>SHIZUKU DESIGN</h1>
        <p style="font-size: 12px; color: #666; letter-spacing: 2px;">ARCHITECTURAL & PAPER-CUTTING ART</p>
    </header>

    <div class="work-display">
        <img src="artwork.jpg" alt="自然瞬间-带露珠的三叶草">
        <div class="description">《三叶草与露珠》 | NATURAL PHOTOGRAPHY</div>
    </div>

    <audio id="myAudio" loop>
        <source src="My Jealousy.mp3" type="audio/mpeg">
    </audio>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon">PLAY</span>
    </div>

    <footer>© 2026 SHIZUKU. ALL RIGHTS RESERVED.</footer>
