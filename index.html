<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIZUKU DESIGN | 作品展示</title>
    <style>
        body { background-color: #111; color: #fff; font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center;}
        header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 40px; width: 100%; max-width: 600px;}
        h1 { font-size: 24px; letter-spacing: 2px; text-transform: uppercase;}
        .work-display { background: #222; border: 1px solid #333; padding: 10px; max-width: 800px; width: 100%;}
        .work-display img { width: 100%; height: auto; display: block; filter: brightness(0.9); transition: 0.3s;}
        .work-display img:hover { filter: brightness(1); }
        .description { margin-top: 15px; font-size: 14px; color: #999; }
        footer { margin-top: 50px; font-size: 12px; color: #666; width: 100%;}
    </style>
</head>
<body>
    <header>
        <h1>SHIZUKU DESIGN</h1>
        <p>建筑与纸艺展示 / 自然瞬间</p>
    </header>
    <div class="work-display">
        <img src="artwork.jpg" alt="自然瞬间-带露珠的三叶草">
        <div class="description">《三叶草与露珠》 | SHIZUKU 摄影作品</div>
    </div>
    <div class="audio-player">
    <p>NOW PLAYING: MJ - APANAY & AREN PARK</p>
    <audio controls loop>
        <source src="My Jealousy.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放。
    </audio>
</div>

<style>
    .audio-player {
        margin-top: 40px;
        padding: 20px;
        border-top: 1px solid #222;
        width: 100%;
        max-width: 400px;
    }
    .audio-player p {
        font-size: 10px;
        letter-spacing: 2px;
        color: #555;
        margin-bottom: 10px;
        text-transform: uppercase;
    }
    audio {
        width: 100%;
        height: 30px;
        filter: invert(1) hue-rotate(180deg) brightness(1.5); /* 让播放器变成深色系适应你的网页 */
        opacity: 0.6;
    }
</style>
    <footer>© 2026 SHIZUKU. 基于 Vercel 强力驱动.</footer>
</body>
</html>
